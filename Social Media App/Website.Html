<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenSpace — Social Media App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeeeec;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:rgba(0,0,0,0.1);--accent:#7f77dd;--accent-bg:#eeedfe;
  --notif:#e24b4a;--card:#fff;--hover:#f5f5f4;
  --radius:12px;--trans:0.18s ease;
}
.dark{
  --bg:#1a1a18;--bg2:#242422;--bg3:#2c2c2a;
  --text:#f0ede8;--text2:#aaa9a5;--text3:#6b6b67;
  --border:rgba(255,255,255,0.1);--card:#242422;--hover:#2c2c2a;
  --accent-bg:#3c3489;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;transition:background var(--trans),color var(--trans)}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea{font:inherit;color:inherit;background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;outline:none;width:100%}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:none;line-height:1.5}

/* ── Layout ── */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;border-right:0.5px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;background:var(--bg)}
.logo{font-size:20px;font-weight:500;color:var(--accent);padding:8px 12px 16px;letter-spacing:-0.5px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text2);transition:background var(--trans),color var(--trans);font-size:14px;text-align:left;width:100%}
.nav-btn:hover{background:var(--hover);color:var(--text)}
.nav-btn.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-icon{font-size:18px;width:22px;text-align:center}
.nav-spacer{flex:1}
#dark-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text2);font-size:14px;cursor:pointer;transition:background var(--trans)}
#dark-toggle:hover{background:var(--hover)}
#main{flex:1;max-width:600px;border-right:0.5px solid var(--border)}
#right-panel{width:300px;padding:16px;display:flex;flex-direction:column;gap:16px}

/* ── Views ── */
#feed,#explore-feed,#profile-view,#notif-view{display:none}
#feed.active,#explore-feed.active,#profile-view.active,#notif-view.active{display:block}
.section-header{padding:16px;border-bottom:0.5px solid var(--border);font-weight:500;font-size:15px;position:sticky;top:0;background:var(--bg);z-index:10;display:flex;align-items:center;justify-content:space-between}

/* ── Compose ── */
.compose-box{padding:16px;border-bottom:0.5px solid var(--border)}
.compose-row{display:flex;gap:10px;align-items:flex-start}
.avatar{border-radius:50%;object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px}
.av-sm{width:32px;height:32px;font-size:11px}
.av-md{width:40px;height:40px}
.av-lg{width:56px;height:56px;font-size:18px}
.compose-inputs{flex:1;display:flex;flex-direction:column;gap:8px}
.compose-textarea{background:none;border:none;border-radius:0;padding:4px 0;font-size:15px;min-height:56px;color:var(--text)}
.compose-textarea::placeholder{color:var(--text3)}
.compose-textarea:focus{border:none}
.compose-actions{display:flex;align-items:center;justify-content:space-between;border-top:0.5px solid var(--border);padding-top:8px;margin-top:4px}
.compose-tools{display:flex;gap:4px}
.tool-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:16px;transition:background var(--trans)}
.tool-btn:hover{background:var(--accent-bg)}
.post-btn{background:var(--accent);color:#fff;padding:6px 18px;border-radius:20px;font-size:13px;font-weight:500;transition:opacity var(--trans)}
.post-btn:hover{opacity:0.85}
.post-btn:disabled{opacity:0.4}

/* ── Post card ── */
.post{padding:16px;border-bottom:0.5px solid var(--border);transition:background var(--trans)}
.post:hover{background:var(--hover)}
.post-header{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.post-meta{flex:1}
.post-name{font-weight:500;font-size:14px;color:var(--text)}
.post-handle{font-size:13px;color:var(--text3);margin-left:4px}
.post-time{font-size:12px;color:var(--text3)}
.post-body{font-size:15px;line-height:1.6;color:var(--text);margin-bottom:12px;padding-left:50px}
.post-img-placeholder{width:100%;border-radius:10px;margin-bottom:12px;height:200px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px}
.post-actions{display:flex;gap:0;padding-left:44px}
.action-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;color:var(--text3);font-size:13px;transition:background var(--trans),color var(--trans);min-width:56px}
.action-btn:hover{background:var(--hover)}
.action-btn.liked{color:#e24b4a}
.action-btn.liked:hover{background:#fcebeb}
.action-btn.reposted{color:#1d9e75}
.like-icon,.comment-icon,.share-icon,.repost-icon{font-size:16px}

/* ── Comments ── */
.comment-section{padding:8px 16px 0 50px;border-top:0.5px solid var(--border);margin:8px 0 0}
.comment-input-row{display:flex;gap:8px;align-items:center;padding:8px 0}
.comment-submit{color:var(--accent);font-weight:500;font-size:13px;padding:4px 12px;border-radius:16px;transition:background var(--trans)}
.comment-submit:hover{background:var(--accent-bg)}
.comment{display:flex;gap:8px;padding:6px 0}
.comment-body{font-size:13px;color:var(--text);line-height:1.5}
.comment-author{font-weight:500;color:var(--text)}

/* ── Right panel ── */
.suggestion-card{background:var(--bg2);border-radius:var(--radius);padding:16px}
.suggestion-title{font-weight:500;font-size:13px;color:var(--text2);margin-bottom:12px}
.suggestion-user{display:flex;align-items:center;gap:10px;padding:6px 0}
.suggestion-info{flex:1}
.suggestion-name{font-weight:500;font-size:13px}
.suggestion-handle{font-size:12px;color:var(--text3)}
.follow-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--accent);color:var(--accent);background:none;transition:background var(--trans),color var(--trans)}
.follow-btn:hover,.follow-btn.following{background:var(--accent);color:#fff}

/* ── Notifications ── */
.notif-dot{width:8px;height:8px;background:var(--notif);border-radius:50%;position:absolute;top:6px;right:6px}
.notif-item{display:flex;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--border);align-items:flex-start;transition:background var(--trans)}
.notif-item.unread{background:var(--accent-bg)}
.notif-item:hover{background:var(--hover)}
.notif-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-text{font-size:13px;line-height:1.6;color:var(--text2)}
.notif-text strong{color:var(--text)}
.notif-time{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Profile ── */
.profile-header{padding:20px 16px;border-bottom:0.5px solid var(--border)}
.profile-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.profile-name{font-size:18px;font-weight:500;margin-bottom:2px}
.profile-handle{font-size:14px;color:var(--text3)}
.profile-bio{font-size:14px;color:var(--text2);line-height:1.6;margin:10px 0}
.profile-stats{display:flex;gap:20px;margin-top:12px}
.stat{text-align:center}
.stat-num{font-weight:500;font-size:16px}
.stat-label{font-size:12px;color:var(--text3)}

/* ── Trending ── */
.trending-item{padding:10px 0;border-bottom:0.5px solid var(--border)}
.trending-tag{font-weight:500;font-size:13px;color:var(--accent)}
.trending-count{font-size:11px;color:var(--text3);margin-top:1px}

/* ── Misc ── */
.live-badge{display:inline-flex;align-items:center;gap:4px;background:#e24b4a;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.pulse{width:6px;height:6px;background:#fff;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.empty-state{padding:40px 20px;text-align:center;color:var(--text3);font-size:14px}
.search-bar{padding:12px 16px;border-bottom:0.5px solid var(--border)}
.trending-header{padding:12px 16px 6px;font-weight:500;font-size:13px;color:var(--text2)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:999}
#toast.show{opacity:1}

/* ── Responsive ── */
@media(max-width:900px){#right-panel{display:none}}
@media(max-width:600px){
  #sidebar{width:60px}
  #sidebar .nav-btn span:not(.nav-icon),.logo{display:none}
  #sidebar .nav-icon{margin:0}
}
</style>
</head>
<body>

<div id="app">

  <!-- Sidebar Navigation -->
  <nav id="sidebar">
    <div class="logo">Flux</div>
    <button class="nav-btn active" onclick="showView('feed')" id="nav-feed">
      <span class="nav-icon">⊞</span><span>Home</span>
    </button>
    <button class="nav-btn" onclick="showView('explore')" id="nav-explore">
      <span class="nav-icon">◎</span><span>Explore</span>
    </button>
    <button class="nav-btn" onclick="showView('notif')" id="nav-notif" style="position:relative">
      <span class="nav-icon">🔔</span><span>Notifications</span>
      <span id="notif-badge" class="notif-dot" style="display:none"></span>
    </button>
    <button class="nav-btn" onclick="showView('profile')" id="nav-profile">
      <span class="nav-icon">◯</span><span>Profile</span>
    </button>
    <div class="nav-spacer"></div>
    <div id="dark-toggle" onclick="toggleDark()">
      <span class="nav-icon" id="dark-icon">☾</span><span>Dark mode</span>
    </div>
  </nav>

  <!-- Main content -->
  <div id="main">

    <!-- Home Feed -->
    <div id="feed" class="active">
      <div class="section-header">
        Home
        <span class="live-badge"><span class="pulse"></span>Live</span>
      </div>
      <div class="compose-box">
        <div class="compose-row">
          <div class="avatar av-md" style="background:#eeedfe;color:#7f77dd">ME</div>
          <div class="compose-inputs">
            <textarea class="compose-textarea" id="compose-text"
              placeholder="What's happening?" rows="2"
              oninput="updatePostBtn()"></textarea>
            <div id="img-preview-wrap"></div>
            <div class="compose-actions">
              <div class="compose-tools">
                <button class="tool-btn" title="Attach image" onclick="addImageToCompose()">🖼</button>
                <button class="tool-btn" title="Add emoji">😊</button>
                <button class="tool-btn" title="Add location">📍</button>
              </div>
              <button class="post-btn" id="post-btn" onclick="submitPost()" disabled>Post</button>
            </div>
          </div>
        </div>
      </div>
      <div id="posts-container"></div>
      <!-- Infinite scroll sentinel -->
      <div id="scroll-sentinel" style="height:20px;"></div>
      <div id="load-more-indicator" style="display:none;padding:16px;text-align:center;color:var(--text3);font-size:13px">
        Loading more posts...
      </div>
    </div>

    <!-- Explore -->
    <div id="explore-feed">
      <div class="section-header">Explore</div>
      <div class="search-bar">
        <input type="text" placeholder="Search people, posts, tags..."
          id="search-input" oninput="doSearch(this.value)">
      </div>
      <div id="explore-content"></div>
    </div>

    <!-- Notifications -->
    <div id="notif-view">
      <div class="section-header">Notifications</div>
      <div id="notif-list"></div>
    </div>

    <!-- Profile -->
    <div id="profile-view">
      <div class="section-header">Profile</div>
      <div class="profile-header">
        <div class="profile-top">
          <div class="avatar av-lg" style="background:#eeedfe;color:#7f77dd">ME</div>
          <button class="follow-btn" style="background:var(--text);color:var(--bg);border-color:var(--text)">Edit profile</button>
        </div>
        <div class="profile-name">Me User</div>
        <div class="profile-handle">@meuser</div>
        <div class="profile-bio">Building things on the internet. Coffee enthusiast. 🚀</div>
        <div class="profile-stats">
          <div class="stat"><div class="stat-num" id="my-post-count">0</div><div class="stat-label">Posts</div></div>
          <div class="stat"><div class="stat-num">24</div><div class="stat-label">Following</div></div>
          <div class="stat"><div class="stat-num" id="my-followers">142</div><div class="stat-label">Followers</div></div>
        </div>
      </div>
      <div id="my-posts-list"></div>
    </div>

  </div><!-- /main -->

  <!-- Right sidebar -->
  <div id="right-panel">
    <div class="suggestion-card" id="who-to-follow">
      <div class="suggestion-title">Who to follow</div>
      <div id="suggestions-list"></div>
    </div>
    <div class="suggestion-card">
      <div class="suggestion-title">Trending</div>
      <div id="trending-list"></div>
    </div>
  </div>

</div><!-- /app -->

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  Data
// ─────────────────────────────────────────────
const users = [
  { id:1, name:"Alex Chen",   handle:"alexchen", av:"AC", color:"#b5d4f4", tc:"#185fa5", bio:"ML researcher | Open source contributor",    followers:3241, following:892, posts:147 },
  { id:2, name:"Jordan Kim",  handle:"jordankim", av:"JK", color:"#c0dd97", tc:"#3b6d11", bio:"Designer & frontend dev. Making things beautiful.", followers:1820, following:540, posts:89  },
  { id:3, name:"Priya Nair",  handle:"priyanair", av:"PN", color:"#f4c0d1", tc:"#993556", bio:"Startup founder. Writing about product & growth.", followers:5102, following:310, posts:203 },
  { id:4, name:"Sam Torres",  handle:"samtor",    av:"ST", color:"#fac775", tc:"#854f0b", bio:"Dev advocate. Talks about devtools & dx.",        followers:988,  following:720, posts:64  },
  { id:5, name:"Mia Lund",    handle:"mialund",   av:"ML", color:"#9fe1cb", tc:"#0f6e56", bio:"PhD candidate. Science, tech, coffee.",           followers:712,  following:420, posts:55  },
];

const seedPosts = [
  { uid:1, text:"Just shipped a new transformer model that runs 3x faster on edge devices. Open-sourcing it next week! 🚀",           hasImg:true,  imgColor:"#e6f1fb", imgIcon:"⚡", time:"2m",  likes:142, comments:[{ uid:2, text:"This is huge! Can't wait to try it." }],                                            liked:false, reposts:31  },
  { uid:2, text:"Hot take: the best UI components are the ones users never notice. Invisible design is the hardest kind.",             hasImg:false,                              time:"14m", likes:87,  comments:[{ uid:3, text:"100% agree. Friction-free > flashy." }, { uid:4, text:"Said by every designer ever lol" }], liked:false, reposts:22  },
  { uid:3, text:"Thread on why most B2B SaaS products fail to cross $1M ARR — and what the survivors all had in common. 🧵",           hasImg:true,  imgColor:"#faeeda", imgIcon:"📈", time:"1h",  likes:312, comments:[{ uid:5, text:"Saved. Going to share this with my team." }],                                       liked:false, reposts:88  },
  { uid:4, text:"New devtool drop: terminal-based git diff viewer with syntax highlighting and side-by-side mode. Zero config.",        hasImg:false,                              time:"2h",  likes:64,  comments:[],                                                                                                        liked:false, reposts:14  },
  { uid:5, text:"Reminder that you don't need a PhD to contribute to ML research. The most impactful papers often start with a simple, nagging question.", hasImg:false,          time:"3h",  likes:231, comments:[{ uid:1, text:"This. Curiosity > credentials." }],                                                       liked:false, reposts:57  },
  { uid:1, text:"Visualizing attention heads in transformers never gets old. There's something deeply satisfying about seeing the model focus.", hasImg:true, imgColor:"#eeedfe", imgIcon:"🔬", time:"5h", likes:198, comments:[],                                                                                          liked:false, reposts:41  },
  { uid:3, text:"The best time to raise a Series A is 6 months before you need the money. The worst time is when you're 2 months from running out.", hasImg:false,               time:"7h",  likes:445, comments:[{ uid:2, text:"And yet most founders wait too long." }, { uid:4, text:"Learning this the hard way rn" }], liked:false, reposts:110 },
  { uid:2, text:"Figma's new dev mode changed how I handoff designs. Fewer back-and-forths, cleaner token exports. Worth the upgrade.",  hasImg:false,                              time:"9h",  likes:91,  comments:[],                                                                                                        liked:false, reposts:18  },
  { uid:4, text:"Why do engineers always underestimate tasks? Because the estimate was made by an engineer who hadn't read the spec. 😅", hasImg:false,                             time:"11h", likes:320, comments:[{ uid:1, text:"Every sprint planning ever." }],                                                          liked:false, reposts:74  },
  { uid:5, text:"Paper of the week: 'Scaling laws for neural language models.' If you haven't read it, today's the day.",               hasImg:true,  imgColor:"#eaf3de", imgIcon:"📄", time:"13h", likes:177, comments:[],                                                                                                  liked:false, reposts:39  },
];

let posts        = seedPosts.map((p, i) => ({ ...p, id: i + 1 }));
let nextId       = posts.length + 1;
let following    = new Set([1, 3]);
let notifications = [];
let notifUnread  = 0;
let pageLoaded   = 1;
const PAGE       = 4;
let loading      = false;
let darkMode     = false;
let pendingImage = null;
let myPostCount  = 0;

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function av(user, size = 'av-md') {
  return `<div class="avatar ${size}" style="background:${user.color};color:${user.tc}">${user.av}</div>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────────
//  Post rendering
// ─────────────────────────────────────────────
function renderPost(post) {
  const isMe   = post.uid === 0;
  const user   = isMe ? null : users.find(u => u.id === post.uid) || { name:'Unknown', handle:'unknown', av:'?', color:'#eee', tc:'#333' };
  const uname  = isMe ? 'Me User'  : user.name;
  const uhandle= isMe ? 'meuser'   : user.handle;
  const uav    = isMe ? 'ME'       : user.av;
  const ucolor = isMe ? '#eeedfe'  : user.color;
  const utc    = isMe ? '#7f77dd'  : user.tc;

  const commentsHtml = post.comments.map(c => {
    const cu = c.uid === 0
      ? { name:'Me User', av:'ME', color:'#eeedfe', tc:'#7f77dd' }
      : users.find(u => u.id === c.uid) || { name:'?', av:'?', color:'#eee', tc:'#333' };
    return `
      <div class="comment">
        <div class="avatar av-sm" style="background:${cu.color};color:${cu.tc}">${cu.av}</div>
        <div class="comment-body">
          <span class="comment-author">${c.uid === 0 ? 'Me User' : cu.name}</span>
          ${escHtml(c.text)}
        </div>
      </div>`;
  }).join('');

  const imgHtml = post.hasImg
    ? `<div class="post-img-placeholder" style="background:${post.imgColor||'var(--bg3)'}">
         <span style="font-size:32px">${post.imgIcon||'🖼'}</span>
       </div>`
    : '';

  const el = document.createElement('div');
  el.className = 'post';
  el.id = 'post-' + post.id;
  el.innerHTML = `
    <div class="post-header">
      <div class="avatar av-md" style="background:${ucolor};color:${utc}">${uav}</div>
      <div class="post-meta">
        <span class="post-name">${uname}</span>
        <span class="post-handle">@${uhandle}</span>
        <div class="post-time">${post.time}</div>
      </div>
    </div>
    <div class="post-body">${escHtml(post.text)}${imgHtml}</div>
    <div class="post-actions">
      <button class="action-btn${post.liked ? ' liked' : ''}" onclick="toggleLike(${post.id})">
        <span class="like-icon">${post.liked ? '♥' : '♡'}</span>
        <span id="lc-${post.id}">${post.likes}</span>
      </button>
      <button class="action-btn" onclick="toggleComments(${post.id})">
        <span class="comment-icon">💬</span>
        <span id="cc-${post.id}">${post.comments.length}</span>
      </button>
      <button class="action-btn${post.reposted ? ' reposted' : ''}" onclick="repost(${post.id})">
        <span class="repost-icon">🔁</span>
        <span id="rc-${post.id}">${post.reposts}</span>
      </button>
      <button class="action-btn" onclick="sharePost(${post.id})">
        <span class="share-icon">↗</span>
      </button>
    </div>
    <div class="comment-section" id="cs-${post.id}" style="display:none">
      <div class="comment-input-row">
        <div class="avatar av-sm" style="background:#eeedfe;color:#7f77dd">ME</div>
        <input type="text" placeholder="Reply..." id="ci-${post.id}" style="flex:1"
          onkeydown="if(event.key==='Enter') addComment(${post.id})">
        <button class="comment-submit" onclick="addComment(${post.id})">Reply</button>
      </div>
      <div id="comments-${post.id}">${commentsHtml}</div>
    </div>`;
  return el;
}

// ─────────────────────────────────────────────
//  Feed + infinite scroll
// ─────────────────────────────────────────────
function renderFeed() {
  const container = document.getElementById('posts-container');
  container.innerHTML = '';
  posts.slice(0, PAGE).forEach(p => container.appendChild(renderPost(p)));
  pageLoaded = 1;
}

function loadMore() {
  if (loading) return;
  const start = pageLoaded * PAGE;
  if (start >= posts.length) {
    document.getElementById('load-more-indicator').style.display = 'none';
    return;
  }
  loading = true;
  document.getElementById('load-more-indicator').style.display = 'block';
  setTimeout(() => {
    const container = document.getElementById('posts-container');
    posts.slice(start, start + PAGE).forEach(p => container.appendChild(renderPost(p)));
    pageLoaded++;
    loading = false;
    document.getElementById('load-more-indicator').style.display = 'none';
  }, 600);
}

// IntersectionObserver → infinite scroll
const scrollObserver = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) loadMore();
}, { threshold: 0.1 });
scrollObserver.observe(document.getElementById('scroll-sentinel'));

// ─────────────────────────────────────────────
//  Post interactions
// ─────────────────────────────────────────────
function toggleLike(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  post.liked = !post.liked;
  post.likes += post.liked ? 1 : -1;

  const btn  = document.querySelector(`#post-${id} .action-btn`);
  btn.classList.toggle('liked', post.liked);
  btn.querySelector('.like-icon').textContent = post.liked ? '♥' : '♡';
  document.getElementById('lc-' + id).textContent = post.likes;

  if (post.liked && post.uid !== 0) {
    const user = users.find(u => u.id === post.uid);
    addNotif('like', '♥', `<strong>${user.name}</strong> liked your post`, '#fcebeb');
  }
}

function toggleComments(id) {
  const cs = document.getElementById('cs-' + id);
  const open = cs.style.display === 'none';
  cs.style.display = open ? 'block' : 'none';
  if (open) document.getElementById('ci-' + id)?.focus();
}

function addComment(id) {
  const input = document.getElementById('ci-' + id);
  const text  = input.value.trim();
  if (!text) return;

  const post = posts.find(p => p.id === id);
  post.comments.push({ uid: 0, text });
  input.value = '';

  const div = document.createElement('div');
  div.className = 'comment';
  div.innerHTML = `
    <div class="avatar av-sm" style="background:#eeedfe;color:#7f77dd">ME</div>
    <div class="comment-body">
      <span class="comment-author">Me User</span> ${escHtml(text)}
    </div>`;
  document.getElementById('comments-' + id).appendChild(div);
  document.getElementById('cc-' + id).textContent = post.comments.length;

  if (post.uid !== 0) {
    const user = users.find(u => u.id === post.uid);
    addNotif('comment', '💬', `<strong>${user.name}</strong> replied to your comment`, '#e6f1fb');
  }
}

function repost(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  post.reposted = !post.reposted;
  post.reposts += post.reposted ? 1 : -1;
  const btn = document.querySelectorAll(`#post-${id} .action-btn`)[2];
  btn.classList.toggle('reposted', post.reposted);
  document.getElementById('rc-' + id).textContent = post.reposts;
  showToast(post.reposted ? 'Reposted!' : 'Repost removed');
}

function sharePost() { showToast('Link copied to clipboard!'); }

// ─────────────────────────────────────────────
//  Compose
// ─────────────────────────────────────────────
function updatePostBtn() {
  document.getElementById('post-btn').disabled =
    !document.getElementById('compose-text').value.trim();
}

function addImageToCompose() {
  const colors  = ['#e6f1fb','#eeedfe','#eaf3de','#faeeda','#fbeaf0'];
  const icons   = ['🌄','🏙','🎨','📸','🌿','🏔'];
  const c = colors[Math.floor(Math.random() * colors.length)];
  const i = icons [Math.floor(Math.random() * icons.length)];
  pendingImage = { color: c, icon: i };
  document.getElementById('img-preview-wrap').innerHTML = `
    <div style="width:100%;border-radius:8px;height:80px;background:${c};
      display:flex;align-items:center;justify-content:center;font-size:28px;margin-top:4px">
      ${i}
    </div>`;
  updatePostBtn();
}

function submitPost() {
  const text = document.getElementById('compose-text').value.trim();
  if (!text) return;

  const newPost = {
    id: nextId++, uid: 0, text,
    hasImg: !!pendingImage,
    imgColor: pendingImage?.color || '#f5f5f4',
    imgIcon: pendingImage?.icon || '🖼',
    time: 'just now', likes: 0, comments: [], liked: false, reposts: 0,
  };
  posts.unshift(newPost);
  myPostCount++;
  document.getElementById('my-post-count').textContent = myPostCount;

  const container = document.getElementById('posts-container');
  const el = renderPost(newPost);
  el.style.cssText = 'opacity:0;transform:translateY(-8px);transition:opacity 0.3s,transform 0.3s';
  container.prepend(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'none'; });

  document.getElementById('compose-text').value = '';
  document.getElementById('img-preview-wrap').innerHTML = '';
  pendingImage = null;
  document.getElementById('post-btn').disabled = true;

  renderMyPosts();
  showToast('Posted!');

  // Simulate a Socket.IO "like" event 3s after posting
  setTimeout(() => {
    addNotif('like', '♥', '<strong>Priya Nair</strong> liked your post', '#fcebeb');
  }, 3000);
}

// ─────────────────────────────────────────────
//  Notifications  (simulates Socket.IO push)
// ─────────────────────────────────────────────
function addNotif(type, icon, html, bg) {
  notifications.unshift({ id: Date.now(), type, icon, html, bg, time: 'just now', unread: true });
  notifUnread++;
  document.getElementById('notif-badge').style.display = 'block';
  renderNotifs();
}

function renderNotifs() {
  const list = document.getElementById('notif-list');
  if (!notifications.length) {
    list.innerHTML = '<div class="empty-state">No notifications yet</div>';
    return;
  }
  list.innerHTML = notifications.map(n => `
    <div class="notif-item${n.unread ? ' unread' : ''}">
      <div class="notif-icon" style="background:${n.bg}">${n.icon}</div>
      <div>
        <div class="notif-text">${n.html}</div>
        <div class="notif-time">${n.time}</div>
      </div>
    </div>`).join('');
}

/**
 * simulateSocketNotifications()
 * In a real app, replace this setInterval with:
 *
 *   const socket = io('https://your-server.com');
 *   socket.on('notification', (data) => addNotif(data.type, data.icon, data.html, data.bg));
 */
function simulateSocketNotifications() {
  const pool = [
    () => addNotif('like',    '♥',  '<strong>Alex Chen</strong> liked your post',          '#fcebeb'),
    () => addNotif('follow',  '👤', '<strong>Mia Lund</strong> started following you',      '#eaf3de'),
    () => addNotif('comment', '💬', '<strong>Sam Torres</strong> commented on your post',   '#e6f1fb'),
    () => addNotif('like',    '♥',  '<strong>Jordan Kim</strong> liked your reply',         '#fcebeb'),
    () => addNotif('follow',  '👤', '<strong>Priya Nair</strong> mentioned you in a post',  '#eeedfe'),
  ];
  let idx = 0;
  setInterval(() => {
    if (document.visibilityState === 'visible') {
      pool[idx % pool.length]();
      idx++;
    }
  }, 12000);
}

// ─────────────────────────────────────────────
//  Follow system
// ─────────────────────────────────────────────
function renderSuggestions() {
  const list    = document.getElementById('suggestions-list');
  const suggest = users.filter(u => !following.has(u.id)).slice(0, 3);
  list.innerHTML = suggest.map(u => `
    <div class="suggestion-user">
      <div class="avatar av-sm" style="background:${u.color};color:${u.tc}">${u.av}</div>
      <div class="suggestion-info">
        <div class="suggestion-name">${u.name}</div>
        <div class="suggestion-handle">@${u.handle}</div>
      </div>
      <button class="follow-btn${following.has(u.id) ? ' following' : ''}"
        id="sfb-${u.id}" onclick="toggleFollow(${u.id})">
        ${following.has(u.id) ? 'Following' : 'Follow'}
      </button>
    </div>`).join('');
}

function toggleFollow(uid) {
  if (following.has(uid)) {
    following.delete(uid);
  } else {
    following.add(uid);
    const user = users.find(u => u.id === uid);
    addNotif('follow', '👤', `You are now following <strong>${user.name}</strong>`, '#eaf3de');
    showToast('Following ' + user.name);
  }
  renderSuggestions();
  // refresh explore follow buttons if visible
  document.querySelectorAll('[id^="efb-"]').forEach(b => {
    const id = parseInt(b.id.replace('efb-', ''));
    b.textContent = following.has(id) ? 'Following' : 'Follow';
    b.classList.toggle('following', following.has(id));
  });
}

// ─────────────────────────────────────────────
//  Trending
// ─────────────────────────────────────────────
function renderTrending() {
  const tags = [
    { tag:'#OpenSource',   count:'12.4K posts' },
    { tag:'#AITools',      count:'8.1K posts'  },
    { tag:'#DesignSystem', count:'5.6K posts'  },
    { tag:'#BuildInPublic',count:'4.2K posts'  },
    { tag:'#WebDev',       count:'3.8K posts'  },
  ];
  document.getElementById('trending-list').innerHTML = tags.map(t => `
    <div class="trending-item">
      <div class="trending-tag">${t.tag}</div>
      <div class="trending-count">${t.count}</div>
    </div>`).join('');
}

// ─────────────────────────────────────────────
//  Explore / Search
// ─────────────────────────────────────────────
function renderExplore(q) {
  const content = document.getElementById('explore-content');
  if (!q) {
    content.innerHTML = '<div class="trending-header">People to follow</div>';
    content.innerHTML += users.map(u => `
      <div class="post" style="cursor:default">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="avatar av-md" style="background:${u.color};color:${u.tc}">${u.av}</div>
          <div style="flex:1">
            <div style="font-weight:500">${u.name}</div>
            <div style="font-size:12px;color:var(--text3)">@${u.handle}</div>
            <div style="font-size:13px;color:var(--text2);margin-top:2px">${u.bio}</div>
          </div>
          <button class="follow-btn${following.has(u.id) ? ' following' : ''}"
            id="efb-${u.id}" onclick="toggleFollow(${u.id})">
            ${following.has(u.id) ? 'Following' : 'Follow'}
          </button>
        </div>
      </div>`).join('');
  } else {
    const results = posts.filter(p =>
      p.text.toLowerCase().includes(q.toLowerCase())
    );
    if (!results.length) {
      content.innerHTML = `<div class="empty-state">No results for "${escHtml(q)}"</div>`;
      return;
    }
    content.innerHTML = `<div class="trending-header">Posts matching "${escHtml(q)}"</div>`;
    const wrap = document.createElement('div');
    results.forEach(p => wrap.appendChild(renderPost(p)));
    content.appendChild(wrap);
  }
}

function doSearch(q) { renderExplore(q); }

// ─────────────────────────────────────────────
//  Profile
// ─────────────────────────────────────────────
function renderMyPosts() {
  const container = document.getElementById('my-posts-list');
  const mine = posts.filter(p => p.uid === 0);
  if (!mine.length) {
    container.innerHTML = '<div class="empty-state">No posts yet. Share something!</div>';
    return;
  }
  container.innerHTML = '';
  mine.forEach(p => container.appendChild(renderPost(p)));
}

// ─────────────────────────────────────────────
//  View router
// ─────────────────────────────────────────────
function showView(view) {
  ['feed','explore-feed','notif-view','profile-view'].forEach(v =>
    document.getElementById(v).classList.remove('active')
  );
  ['nav-feed','nav-explore','nav-notif','nav-profile'].forEach(v =>
    document.getElementById(v).classList.remove('active')
  );

  const map = {
    feed:    { view:'feed',         nav:'nav-feed'    },
    explore: { view:'explore-feed', nav:'nav-explore' },
    notif:   { view:'notif-view',   nav:'nav-notif'   },
    profile: { view:'profile-view', nav:'nav-profile' },
  };
  const { view: vId, nav } = map[view];
  document.getElementById(vId).classList.add('active');
  document.getElementById(nav).classList.add('active');

  if (view === 'explore') renderExplore('');
  if (view === 'profile') renderMyPosts();
  if (view === 'notif') {
    notifUnread = 0;
    document.getElementById('notif-badge').style.display = 'none';
    notifications.forEach(n => n.unread = false);
    renderNotifs();
  }
}

// ─────────────────────────────────────────────
//  Dark mode
// ─────────────────────────────────────────────
function toggleDark() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('dark-icon').textContent = darkMode ? '☀' : '☾';
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
renderFeed();
renderSuggestions();
renderTrending();
renderNotifs();
simulateSocketNotifications();

// Welcome notification after 4s
setTimeout(() =>
  addNotif('follow', '👤', '<strong>Alex Chen</strong> started following you', '#eaf3de'),
4000);
</script>
